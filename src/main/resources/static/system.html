<!DOCTYPE html>
<html>

<head>

<title>Distributed System Monitor</title>

<style>

body{
font-family:Segoe UI;
background:#f4f6f9;
text-align:center;
}

h1{
margin-top:30px;
}

.node{
display:inline-block;
width:180px;
padding:20px;
margin:20px;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.running{
color:green;
font-weight:bold;
}

.flow{
margin-top:40px;
font-size:20px;
}

</style>

</head>

<body>

<h1>Distributed System Monitor</h1>

<div>

<div class="node">
Gateway Server<br>
Laptop 1<br>
<span class="running">Running</span>
</div>

<div class="node">
Edge Node<br>
Laptop 2<br>
<span class="running">Running</span>
</div>

<div class="node">
Core Service<br>
Laptop 3<br>
<span class="running">Running</span>
</div>

<div class="node">
PostgreSQL DB<br>
Laptop 4<br>
<span class="running">Running</span>
</div>

</div>

<div class="flow">

Request Flow:

<br><br>

Gateway → Edge → Core → Database

</div>

</body>
</html>
